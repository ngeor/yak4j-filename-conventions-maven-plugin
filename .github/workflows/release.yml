name: release

on:
  push:
    tags: [ "v*" ]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'zulu'
        cache: 'maven'
    - run: curl -L -o /tmp/java.jar https://github.com/ngeor/java/releases/download/v5.1.2/java-5.1.2.jar
    - run: >-
        java -cp /tmp/java.jar
        com.github.ngeor.DeployApp
        --gpg-key-contents ${{ secrets.GPG_KEY_CONTENTS }}
        --gpg-key-name ${{ secrets.GPG_KEY }}
        --gpg-passphrase ${{ secrets.GPG_PASSPHRASE }}
        --maven-username ${{ secrets.OSSRH_USERNAME }}
        --maven-password ${{ secrets.OSSRH_PASSWORD }}
